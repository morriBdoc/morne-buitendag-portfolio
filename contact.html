    <main>
      <form action="">
        <h2>Contact Me</h2>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="John Doe"
          required
        />
        <input
          type="email"
          name="email"
          id="email"
          placeholder="johndoe@email.com"
          required
        />
        <textarea
          name="message"
          id="message"
          placeholder="Message..."
          required
        ></textarea>
        <input type="submit" name="submit" id="submit" />
      </form>
    </main>
